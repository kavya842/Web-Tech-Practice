<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
    margin:0;
    padding:0;
    font-family: 'Segoe UI', sans-serif;
    /* background: linear-gradient(135deg,#ffecd2,#fcb69f); */
}
#root{
    width:92%;
    margin:auto;
    margin-top:40px;
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}
main{
    background: linear-gradient(145deg,#ffffff,#f0f8ff);
    padding:20px;
    border-radius:18px;
    box-shadow:0 8px 18px rgba(0,0,0,0.2);
    transition:0.4s;
    position:relative;
    overflow:hidden;
}
main::before{
    content:"";
    position:absolute;
    width:100%;
    height:8px;
    top:0;
    left:0;
    background: linear-gradient(90deg,#ff512f,#dd2476,#1fa2ff);
}
main:hover{
    transform: translateY(-10px) scale(1.03);
    box-shadow:0 12px 25px rgba(0,0,0,0.3);
}
h1{
    color:#ff512f;
    font-size:20px;
    margin-bottom:8px;
}
h2{
    color:#1fa2ff;
    font-size:22px;
    margin:6px 0;
}
p{
    color:#444;
    font-size:15px;
    line-height:1.5;
}
h3{
    background: linear-gradient(90deg,hsla(269, 77%, 41%, 0.811),#354e3e);
    color:white;
    padding:6px 10px;
    border-radius:8px;
    display:inline-block;
    margin:6px 4px 0 0;
    font-size:14px;
}
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="./fetch2.js"></script>
</body>
</html>
