<head>

    <style>

              padding:0;

}
#root{
    width:85%;
    margin:auto;
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(300px,1fr));

    margin-top:40px;
}

    padding:20px;

    box-shadow:0px 4px 12px rgba(0, 0, 0, 0.03);
    transition:0.3s;
    border-left:6px solid #5110dc;
}
main:hover{
    transform:scale(1.05);
}
h3{
    color:#0d6efd;
    font-size:17px;
    margin-bottom:10px;
}
h6{
    color:#222;
    font-size:14px;
    line-height:1.2;
}
h3{
    color:#555;
    font-size:16px;
    margin-top:15px;
    text-align:right;
}

</head>

    <div id="root"></div>
